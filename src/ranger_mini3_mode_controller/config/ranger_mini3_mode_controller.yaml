ranger_mini3_mode_controller:
  ros__parameters:
    cmd_vel_in_topic: /cmd_vel_safe
    # Commercial runtime: robot_safety owns final /cmd_vel.  This node remains a
    # motion-mode observer/diagnostic and must not be in the critical speed path.
    cmd_vel_out_topic: /ranger_mini3/mode_controller_shadow_cmd_vel

    publish_rate_hz: 50.0
    cmd_timeout_s: 0.25
    allow_reverse: false
    lateral_policy: reject
    reverse_enable_topic: /ranger_mini3/allow_reverse
    docking_reverse_enable_topic: /ranger_mini3/docking_allow_reverse
    teleop_reverse_enable_topic: /ranger_mini3/teleop_allow_reverse
    reverse_enable_timeout_s: 0.75
    linear_epsilon_mps: 0.02
    lateral_epsilon_mps: 0.02
    yaw_epsilon_radps: 0.02
    publish_zero_on_startup: true

    status_topic: /ranger_mini3_mode_controller/status
    desired_mode_topic: /ranger_mini3/desired_motion_mode
    actual_motion_state_topic: /motion_state
    actual_system_state_topic: /system_state
    actual_motion_mode_max_age_sec: 0.5
    mode_alignment_warn_after_sec: 0.25
    forced_mode_topic: /ranger_mini3/forced_mode
    park_topic: /ranger_mini3/park
