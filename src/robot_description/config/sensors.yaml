robot_description:
  ros__parameters:
    base_frame: base_link
    ranger_base_frame: ranger_base_link
    lidar_mount_frame: lidar_mount_link
    lidar_frame: lidar_link
    lidar_level_frame: lidar_level_link
    imu_frame: imu_link
    gs2_frame: gs2_link
    charge_contact_frame: charge_contact_link
    base_footprint_frame: base_footprint
    lidar_xyz: [0.3686, 0.0000, 0.85]
    lidar_rpy: [0.0, -0.3490658503988659, -3.127692216127]
    # JT128 raw axis alignment is applied by the canonical remap nodes before
    # publishing /lidar_points and /lidar_imu. Keep lidar_link canonical here.
    lidar_axis_rpy: [0.0, 0.0, 0.0]
    imu_xyz: [0.3686, 0.0000, 0.85]
    imu_rpy: [0.0, -0.3490658503988659, -3.127692216127]
    # GS2 is mounted on the front centerline, flush with the front body plane.
    # X uses the current Nav2 footprint front edge; adjust after measuring the
    # exact base_link-to-front-panel distance on the finished body.
    gs2_xyz: [0.36, 0.0, 0.290]
    gs2_rpy: [0.0, 0.0, 0.0]
    # Charging contacts are on the same front centerline as GS2 and sit 3.8 cm
    # ahead of the GS2 reference plane along vehicle +X.
    charge_contact_xyz: [0.398, 0.0, 0.255]
    charge_contact_rpy: [0.0, 0.0, 0.0]
    local_reuse_description_xacro: D:/codespace/car/ros2_ws/src/car_description/urdf/hesai_lidar_mount.urdf.xacro
