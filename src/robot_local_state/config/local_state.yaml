robot_local_state:
  ros__parameters:
    mock_mode: true
    publish_tf: true
    output_topic: /local_state/odometry
    input_odom_topic: /wheel/odom
    input_base_frame: ranger_base_link
    input_imu_topic: /sensors/lidar/imu
    odom_frame: odom
    base_frame: base_link
    # Ranger native ranger_base_link heading is opposite to the project
    # canonical base_link heading on the current Mini 3 installation.
    # Correct only the child-frame yaw; the odom position is the same origin.
    odom_yaw_offset_rad: 0.0
    rotate_odom_position_with_yaw_offset: false
    publish_rate_hz: 20.0
