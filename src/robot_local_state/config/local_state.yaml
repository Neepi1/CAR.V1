robot_local_state:
  ros__parameters:
    mock_mode: true
    publish_tf: true
    output_topic: /local_state/odometry
    input_odom_topic: /wheel/odom
    input_base_frame: base_link
    input_imu_topic: /sensors/lidar/imu
    odom_frame: odom
    base_frame: base_link
    # Passthrough diagnostics preserve the same canonical child frame as EKF.
    odom_yaw_offset_rad: 0.0
    rotate_odom_position_with_yaw_offset: false
    publish_rate_hz: 30.0
    republish_latest: true
    republish_latest_max_age_sec: 0.50
