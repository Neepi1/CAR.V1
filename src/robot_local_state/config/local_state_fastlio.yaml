robot_local_state:
  ros__parameters:
    publish_tf: true
    output_topic: /local_state/odometry
    input_odom_topic: /fastlio/base_odometry
    input_base_frame: base_link
    odom_frame: odom
    base_frame: base_link
    anchor_pose_to_first_sample: false
    odom_yaw_offset_rad: 0.0
    rotate_odom_position_with_yaw_offset: false
    publish_rate_hz: 30.0
    republish_latest: true
    republish_latest_max_age_sec: 0.50
    apply_pose_covariance_floor: true
    pose_covariance_floor_x: 0.03
    pose_covariance_floor_y: 0.03
    pose_covariance_floor_yaw: 0.08
    apply_twist_covariance_floor: true
    twist_covariance_floor_vx: 0.02
    twist_covariance_floor_vy: 0.02
    twist_covariance_floor_vyaw: 0.05
