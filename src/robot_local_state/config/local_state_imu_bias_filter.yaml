imu_gyro_bias_filter:
  ros__parameters:
    imu_topic: /lidar_imu
    odom_topic: /wheel/odom_ekf
    cmd_vel_topic: /cmd_vel_safe
    output_imu_topic: /lidar_imu_bias_corrected
    bias_topic: /local_state/imu_bias
    use_odom_stationary: true
    use_cmd_vel_stationary: true
    require_fresh_cmd_vel: false
    odom_timeout_sec: 0.5
    cmd_vel_timeout_sec: 0.5
    stationary_required_sec: 1.0
    odom_linear_threshold_mps: 0.01
    odom_angular_threshold_radps: 0.01
    cmd_linear_threshold_mps: 0.01
    cmd_angular_threshold_radps: 0.01
    max_bias_sample_abs_radps: 0.05
    accumulator_alpha: 0.02
    zero_output_when_stationary: true
    corrected_output_rate_hz: 100.0
    bias_publish_rate_hz: 10.0
    corrected_output_latest_on_timer: true
    corrected_output_preserve_source_stamp: true
    corrected_output_max_source_age_sec: 0.20
    bias_publish_preserve_source_stamp: true
