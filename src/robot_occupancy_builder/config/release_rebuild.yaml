    terrain_y_min: -10.0
    terrain_y_max: 10.0
    terrain_neighbor_radius: 1
    terrain_ground_quantile: 0.15
    terrain_min_points_per_cell: 2
    class_ground_min_rel_z: -0.08
    class_ground_max_rel_z: 0.08
    class_ramp_min_rel_z: 0.02
    class_ramp_max_rel_z: 0.28
