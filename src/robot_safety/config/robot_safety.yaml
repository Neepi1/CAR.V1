robot_safety:
  ros__parameters:
    mock_mode: true
    watchdog_timeout_sec: 1.0
    publish_rate_hz: 10.0
    cmd_vel_in_topic: /cmd_vel_collision_checked
    api_cmd_vel_in_topic: /cmd_vel_api
    enable_api_cmd_priority: true
    api_cmd_priority_timeout_sec: 0.25
    docking_cmd_vel_in_topic: /cmd_vel_docking
    enable_docking_cmd_priority: true
    docking_cmd_priority_timeout_sec: 0.25
    cmd_vel_out_topic: /cmd_vel
    cmd_vel_mirror_topic: /cmd_vel_safe
    cmd_vel_qos_depth: 1
    zero_cmd_priority_enabled: true
    zero_cmd_priority_epsilon: 0.0001
    zero_cmd_priority_burst_sec: 0.25
    spin_to_drive_settle_enabled: true
    spin_to_drive_odom_topic: /wheel/odom
    spin_to_drive_wz_threshold_radps: 0.02
    spin_to_drive_stable_samples: 5
    spin_to_drive_require_local_odom_stable: false
    spin_to_drive_local_odom_topic: /local_state/odometry
    spin_to_drive_local_wz_threshold_radps: 0.03
    spin_to_drive_local_stable_samples: 5
    spin_to_drive_local_stable_duration_sec: 0.30
    spin_to_drive_local_yaw_delta_threshold_rad: 0.005
    spin_to_drive_local_odom_max_age_sec: 0.20
    spin_to_drive_require_imu_stable: true
    spin_to_drive_imu_topic: /lidar_imu_bias_corrected
    spin_to_drive_imu_wz_threshold_radps: 0.035
    spin_to_drive_imu_stable_duration_sec: 0.30
    spin_to_drive_imu_max_age_sec: 0.10
    spin_to_drive_timeout_sec: 2.0
    spin_to_drive_linear_epsilon_mps: 0.03
    spin_to_drive_odom_max_age_sec: 0.20
    mode_exit_guard_enabled: true
    mode_controller_status_topic: /ranger_base/status
    mode_exit_guard_probe_speed_mps: 0.06
    mode_exit_guard_timeout_sec: 1.0
    mode_exit_guard_status_max_age_sec: 0.5
    allow_reverse: false
    reverse_enable_topic: /ranger_mini3/allow_reverse
    docking_reverse_enable_topic: /ranger_mini3/docking_allow_reverse
    teleop_reverse_enable_topic: /ranger_mini3/teleop_allow_reverse
    reverse_enable_timeout_sec: 0.75
    final_cmd_lateral_deadband_mps: 0.001
    allow_api_lateral_cmd: true
    api_lateral_max_mps: 0.10
    estop_topic: /safety/estop
    localization_ok_topic: /localization/health
    require_localization_health: false
    block_normal_motion_when_docked: true
    enable_bms_contact_guard: true
    enable_docking_status_guard: true
    enable_docked_latch_file_guard: true
    docked_status_prefixes: [docked, charging]
    battery_state_topic: /battery_state
    docking_status_topic: /docking/status
    docking_contact_latch_file: /workspaces/njrh-v3/workspace1/maps_release/docking_contact_latch.json
    dock_contact_max_age_sec: 3.0
    allow_docking_cmd_when_docked: true
    charging_current_min_a: 0.10
    charging_contact_voltage_min_v: 40.0
    charging_contact_voltage_max_v: 1000.0
    charging_full_soc_threshold_pct: 99.0
    charging_full_soc_voltage_contact_enable: true
    status_topic: /safety/status
    motion_allowed_topic: /safety/motion_allowed
    publish_zero_on_startup: true
