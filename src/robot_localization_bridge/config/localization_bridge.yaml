robot_localization_bridge:
  ros__parameters:
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    jump_threshold_m: 1.0
    forced_jump_threshold_m: 20.0
    timeout_sec: 1.0
    publish_rate_hz: 50.0
    map_odom_publish_gap_warn_ms: 100.0
    map_odom_publish_gap_fail_ms: 250.0
    map_odom_smoothing_enabled: true
    map_odom_smoothing_publish_rate_hz: 50.0
    map_odom_smoothing_translation_rate_mps: 0.20
    map_odom_smoothing_yaw_rate_radps: 0.25
    map_odom_smoothing_snap_translation_epsilon_m: 0.005
    map_odom_smoothing_snap_yaw_epsilon_rad: 0.005
    map_odom_large_correction_translation_m: 0.50
    map_odom_large_correction_yaw_rad: 0.35
    map_odom_large_correction_requires_recovery: true
    map_odom_online_hard_reject_translation_m: 0.80
    map_odom_online_hard_reject_yaw_rad: 0.80
    tf_future_stamp_offset_sec: 0.10
    localization_topic: /global_localization/pose
    local_odom_topic: /local_state/odometry
    health_topic: /localization/health
    status_topic: /localization/bridge_status
    force_accept_service: /robot_localization_bridge/force_accept_next_localization
    correction_pause_service: /robot_localization_bridge/set_correction_paused
    two_d_mode: true
    # Legacy compatibility knob. Phase A2 removed Isaac continuous localization;
    # any non-triggered value is ignored by the bridge.
    continuous_localization_mode: triggered
    triggered_max_result_age_ms: 5000.0
    max_odom_tf_age_ms: 100.0
    triggered_allow_large_correction: true
    triggered_hard_reject_translation_m: 20.0
    amcl_pose_topic: /amcl_pose
    amcl_runtime_status_file: /tmp/njrh_amcl_runtime_status.env
    amcl_runtime_status_ttl_sec: 5.0
    amcl_input_enabled: false
    amcl_gate_mode: shadow
    amcl_max_result_age_ms: 500.0
    amcl_small_correction_translation_m: 0.30
    amcl_small_correction_yaw_rad: 0.20
    amcl_medium_correction_translation_m: 0.70
    amcl_medium_correction_yaw_rad: 0.20
    amcl_medium_correction_consistency_count: 3
    amcl_hard_reject_translation_m: 1.20
    amcl_hard_reject_yaw_rad: 0.8
    amcl_min_pose_covariance_ok: true
    amcl_max_xy_covariance: 1.0
    amcl_max_yaw_covariance: 0.5
    amcl_accept_when_isaac_recently_triggered_delay_sec: 2.0
    amcl_initial_pose_topic: /initialpose
    amcl_initial_pose_seed_enabled: true
    amcl_initial_pose_xy_covariance: 0.25
    amcl_initial_pose_yaw_covariance: 0.25
    amcl_seed_service: /robot_localization_bridge/seed_amcl_initial_pose
    amcl_pose_max_age_ms: 1000.0
    amcl_initial_pose_publish_repetitions: 3
    amcl_initial_pose_repeat_period_ms: 100
    amcl_scan_admission_enabled: false
    amcl_scan_admission_status_topic: /amcl_scan_admission/status
    local_reference_bridge_config: D:/codespace/car/nav2_test/params/jt128_map_to_odom_tf_bridge.yaml
