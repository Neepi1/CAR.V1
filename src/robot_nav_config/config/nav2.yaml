lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
      - collision_monitor

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.25
      downsample_costmap: false
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 12.0
    odom_topic: /local_state/odometry
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.6
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath", "FollowPathFallback"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 12.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: false
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.35
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_mppi_controller::MPPIController"
      angular_dist_threshold: 0.85
      forward_sampling_distance: 0.55
      rotate_to_heading_angular_vel: 0.85
      max_angular_accel: 2.4
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: true
      time_steps: 44
      model_dt: 0.09
      batch_size: 1200
      iteration_count: 1
      prune_distance: 4.5
      transform_tolerance: 0.30
      temperature: 0.30
      gamma: 0.03
      motion_model: "Ackermann"
      AckermannConstraints:
        min_turning_r: 0.81
      visualize: false
      regenerate_noises: false
      retry_attempt_limit: 3
      reset_period: 1.0
      vx_std: 0.28
      vy_std: 0.0
      wz_std: 0.45
      vx_max: 0.55
      vx_min: 0.0
      vy_max: 0.0
      wz_max: 0.70
      critics:
        - "ObstaclesCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "TwirlingCritic"
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        threshold_to_consider: 0.8
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        threshold_to_consider: 0.8
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 2.0
        critical_weight: 20.0
        consider_footprint: true
        collision_cost: 100000.0
        collision_margin_distance: 0.08
        near_goal_distance: 0.25
        inflation_radius: 0.35
        cost_scaling_factor: 6.0
        inflation_layer_name: "local_inflation_layer"
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.8
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.8
        offset_from_furthest: 10
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        offset_from_furthest: 8
        threshold_to_consider: 0.8
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.8
        max_angle_to_furthest: 1.5
        mode: 0
      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 1.0
    FollowPathFallback:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.45
      lookahead_dist: 0.75
      min_lookahead_dist: 0.40
      max_lookahead_dist: 1.10
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.00
      transform_tolerance: 0.35
      use_velocity_scaled_lookahead_dist: true
      use_rotate_to_heading: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.80
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: "odom"
    robot_base_frame: "base_link"
    transform_tolerance: 0.25
    simulate_ahead_time: 1.5
    max_rotational_vel: 1.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.5

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /local_state/odometry
    bt_loop_duration: 10
    default_server_timeout: 20
    transform_tolerance: 0.25
    default_nav_to_pose_bt_xml: /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml
    default_nav_through_poses_bt_xml: /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 0

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["SimpleSmoother"]
    SimpleSmoother:
      plugin: "nav2_smoother::SimpleSmoother"

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.60, 0.0, 1.00]
    min_velocity: [0.0, 0.0, -1.00]
    max_accel: [1.2, 0.0, 2.0]
    max_decel: [-1.2, 0.0, -2.0]
    odom_topic: /local_state/odometry
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      rolling_window: false
      track_unknown_space: true
      resolution: 0.05
      transform_tolerance: 0.5
      footprint: "[[0.36, 0.25], [0.36, -0.25], [-0.36, -0.25], [-0.36, 0.25]]"
      footprint_padding: 0.03
      plugins: ["static_layer", "global_inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /map
        map_subscribe_transient_local: true
        subscribe_to_updates: false
      global_inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 5.0
        inflation_radius: 0.60
      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 12.0
      publish_frequency: 8.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      transform_tolerance: 0.3
      footprint: "[[0.36, 0.25], [0.36, -0.25], [-0.36, -0.25], [-0.36, 0.25]]"
      footprint_padding: 0.03
      plugins: ["voxel_layer", "local_inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: -0.20
        z_resolution: 0.10
        z_voxels: 16
        min_obstacle_height: -0.20
        max_obstacle_height: 1.40
        mark_threshold: 2
        observation_sources: obstacle_points clearing_points
        obstacle_points:
          topic: /perception/obstacle_points
          sensor_frame: lidar_link
          data_type: PointCloud2
          marking: true
          clearing: true
          observation_persistence: 0.0
          min_obstacle_height: -0.20
          max_obstacle_height: 1.40
          obstacle_min_range: 0.10
          obstacle_max_range: 5.50
          raytrace_min_range: 0.10
          raytrace_max_range: 8.00
        clearing_points:
          topic: /perception/clearing_points
          sensor_frame: lidar_link
          data_type: PointCloud2
          marking: false
          clearing: true
          observation_persistence: 0.0
          min_obstacle_height: -0.20
          max_obstacle_height: 1.40
          obstacle_min_range: 0.10
          obstacle_max_range: 5.50
          raytrace_min_range: 0.10
          raytrace_max_range: 8.00
      local_inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 6.0
        inflation_radius: 0.35
      always_send_full_costmap: true

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "/cmd_vel_nav"
    cmd_vel_out_topic: "/cmd_vel_collision_checked"
    transform_tolerance: 0.25
    source_timeout: 0.6
    base_shift_correction: true
    stop_pub_timeout: 0.3
    polygons: ["StopZone", "SlowZone"]
    StopZone:
      type: "polygon"
      points: [0.42, 0.22, 0.42, -0.22, -0.30, -0.22, -0.30, 0.22]
      action_type: "stop"
      max_points: 8
      visualize: false
      polygon_pub_topic: "collision_monitor/stop_zone"
      enabled: true
    SlowZone:
      type: "polygon"
      points: [0.85, 0.45, 0.85, -0.45, -0.35, -0.45, -0.35, 0.45]
      action_type: "slowdown"
      slowdown_ratio: 0.65
      max_points: 12
      visualize: false
      polygon_pub_topic: "collision_monitor/slow_zone"
      enabled: true
    observation_sources: ["obstacle_points"]
    obstacle_points:
      type: "pointcloud"
      topic: "/perception/obstacle_points"
      min_height: -0.20
      max_height: 1.60
      enabled: true
