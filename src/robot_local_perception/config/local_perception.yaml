robot_local_perception:
  ros__parameters:
    mock_mode: true
    mode: NORMAL
    mode_topic: /robot_mode
    input_topic: /lidar_points
    output_topic: /perception/obstacle_points
    clearing_output_topic: /perception/clearing_points
    output_frame_id: base_link
    restamp_to_now: true
    restamp_to_latest_tf: true
    require_output_stamp_tf: true
    output_stamp_tf_target_frame: odom
    lookup_timeout_sec: 0.1
    processing_rate_hz: 8.0
    point_sample_stride: 4
    max_filtered_points: 12000
    clearing.enabled: true
    clearing.range_filter.min: 0.10
    clearing.range_filter.max: 8.00
    clearing.height_filter.min_z: -0.30
