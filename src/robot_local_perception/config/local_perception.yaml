    clearing.virtual_rays.range: 8.00
    clearing.virtual_rays.range_steps: [0.50, 1.00, 2.00, 3.50, 5.50, 8.00]
    clearing.virtual_rays.endpoint_z_values: [-0.10, 0.05, 0.20, 0.40, 0.60, 0.85, 1.10, 1.30]
    publish_debug_log: false
    local_nav_preprocessor_reference: D:/codespace/car/nav2_test/params/jt128_nav_cloud_preprocessor.yaml
    supported_modes: [NORMAL, RAMP, ELEVATOR_WAIT, DOORWAY]

