robot_localization_bridge:
  ros__parameters:
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    jump_threshold_m: 2.0
    forced_jump_threshold_m: 20.0
    timeout_sec: 1.5
    publish_rate_hz: 20.0
    tf_future_stamp_offset_sec: 0.05
    localization_topic: /localization_result
    local_odom_topic: /local_state/odometry
    health_topic: /localization/health
    force_accept_service: /robot_localization_bridge/force_accept_next_localization
    two_d_mode: true
