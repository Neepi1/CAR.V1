robot_local_state:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.15
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /wheel/odom_ekf
    # Wheel odometry anchors x/y/yaw pose as well as forward/yaw velocity.
    # Nav2 needs a low-latency heading in odom; the JT128 IMU contributes
    # yaw-rate only and cannot provide an absolute yaw anchor by itself.
    odom0_config: [true, true, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 20
    odom0_nodelay: true
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 1.5

    imu0: /lidar_imu_bias_corrected
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 100
    imu0_nodelay: true
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    use_control: false
