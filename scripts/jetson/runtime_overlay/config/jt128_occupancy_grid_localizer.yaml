occupancy_grid_localizer:
  ros__parameters:
    loc_result_frame: map
    use_gxf_map_convention: false

    sample_distance: 0.05
    max_points: 20000
    robot_radius: 0.35

    # The current JT128 2D slice is still relatively sparse near the robot due
    # to vehicle-body occlusion. Use a wider acceptance band than the upstream
    # defaults so Isaac can return a coarse global pose instead of timing out.
    max_beam_error: 1.20
    max_output_error: 1.00
    min_output_error: 0.05

    num_beams_gpu: 512
    batch_size: 1024
    out_of_range_threshold: 41.0
    invalid_range_threshold: 0.0
    min_scan_fov_degrees: 120.0
    use_closest_beam: true
