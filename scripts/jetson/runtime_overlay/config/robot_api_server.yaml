    mapping_2d_start_command: "/workspaces/njrh-v3/workspace1/scripts/jetson/runtime_overlay/scripts/run_projected_map.sh"
    mapping_2d_log_file: "/tmp/njrh_mapping2d_slam_toolbox.log"
    mapping_lidar_rps_xps_state_dir: "/tmp/njrh_slam2d_lidar_rps_xps"
    navigation_resume_command: "/workspaces/njrh-v3/workspace1/scripts/jetson/runtime_overlay/scripts/run_navigation_runtime_services.sh"
    navigation_resume_log_file: "/workspaces/njrh-v3/workspace1/scripts/jetson/runtime_overlay/web_dashboard/runtime_logs/resident_navigation_runtime.log"
    runtime_map_context_file: "/tmp/njrh_runtime_map_context.json"
    navigation_resume_starting_context_ttl_sec: 300.0
    amcl_runtime_status_file: "/tmp/njrh_amcl_runtime_status.env"
    amcl_runtime_status_ttl_sec: 5.0
    last_navigation_map_file: "/workspaces/njrh-v3/workspace1/maps_release/last_navigation_map.json"
    navigation_stop_command: "/workspaces/njrh-v3/workspace1/scripts/jetson/runtime_overlay/scripts/stop_floor_navigation.sh"
    navigation_stop_log_file: "/tmp/njrh_navigation_stop.log"
    docking_manager_start_command: "/workspaces/njrh-v3/workspace1/scripts/jetson/runtime_overlay/scripts/run_docking_manager.sh"
    docking_manager_log_file: "/tmp/njrh_docking_manager.log"
    docking_start_service: "/docking/start"
    docking_stop_service: "/docking/stop"
    docking_undock_service: "/docking/undock"
    docking_status_topic: "/docking/status"
    docking_gs2_scan_topic: "/dock/gs2_scan"
    docking_contact_latch_file: "/workspaces/njrh-v3/workspace1/maps_release/docking_contact_latch.json"
    dock_contact_latch_bms_ttl_sec: 300.0
    dock_contact_latch_bms_require_contact_sec: 2.0
    dock_contact_latch_bms_clear_no_contact_sec: 3.0
    dock_contact_latch_allow_bms_stale_auto_undock: false
    dock_contact_latch_clear_when_live_undocked_no_contact: true
    dock_contact_latch_max_age_warn_sec: 600.0
    docking_pre_dock_distance_m: 0.60
    docking_navigation_start_wait_sec: 45.0
    docking_predock_nav_timeout_sec: 180.0
    # Keep Nav2 as the primary owner until it finishes the pre-dock goal.
    # API yaw/lateral capture still runs after Nav2 success/abort verification.
    docking_predock_early_handoff_enabled: false
    docking_relocalize_before_predock: false
    docking_relocalize_after_predock: false
    docking_relocalize_after_predock_required: false
    docking_relocalize_after_fine_docking: false
    docking_relocalize_after_fine_docking_required: false
    docking_validate_predock_pose_after_relocalization: true
    docking_predock_pose_max_distance_m: 0.30
    docking_predock_pose_max_yaw_rad: 0.35
    docking_manual_predock_distance_check_enable: false
    docking_manual_predock_min_distance_m: 0.50
    docking_manual_predock_max_distance_m: 1.20
    docking_manual_predock_max_yaw_error_rad: 0.80
    docking_relocalize_wait_sec: 8.0
    docking_relocalize_recent_result_max_age_sec: 5.0
    undock_relocalize_after_success: true
    undock_relocalize_wait_sec: 8.0
    docking_cancel_active_goal_before_predock: true
    navigation_auto_undock_timeout_sec: 28.0
    docking_undock_charging_retry_sec: 3.0
    docking_framework_state_machine_enabled: true
    docking_default_dock_profile_id: "gs2_rear_charging_dock"
    docking_default_dock_profile_type: "gs2_near_field"
    docking_default_approach_direction: "reverse"
    docking_default_contact_frame: "charge_contact_link"
    docking_default_sensor_frame: "gs2_link"
    docking_max_retries: 2
    predock_yaw_align_enabled: true
    predock_yaw_align_fallback_enabled: true
    predock_yaw_align_cmd_topic: "/cmd_vel_docking"
    predock_yaw_align_tolerance_rad: 0.0698
    predock_yaw_align_trigger_rad: 0.0698
    predock_yaw_align_hard_fail_rad: 3.14
    predock_yaw_align_timeout_sec: 10.0
    predock_yaw_align_min_speed_radps: 0.05
    predock_yaw_align_max_speed_radps: 0.20
    predock_yaw_align_kp: 1.2
    predock_yaw_align_success_hold_count: 3
    predock_yaw_align_period_ms: 67
    predock_yaw_align_zero_cmd_count: 5
    predock_yaw_align_require_actual_spin: true
    predock_yaw_align_mode_switch_timeout_sec: 2.0
    predock_yaw_align_no_yaw_motion_timeout_sec: 2.0
    predock_yaw_align_motion_epsilon_rad: 0.01
    predock_lateral_align_enabled: true
    predock_lateral_align_target_m: 0.03
    predock_lateral_align_trigger_m: 0.03
    predock_lateral_align_max_correction_m: 0.25
    predock_lateral_align_yaw_slack_rad: 0.02
    predock_staging_capture_max_cycles: 6
    predock_forward_capture_min_m: -0.40
    predock_forward_capture_max_m: 0.55
    predock_lateral_align_timeout_sec: 14.0
    predock_lateral_align_speed_mps: 0.04
    predock_lateral_align_kp: 0.7
    predock_lateral_align_period_ms: 67
    predock_lateral_align_zero_cmd_count: 5
    # Positive predock lateral error is reduced by negative Ranger side-slip y.
    predock_lateral_align_command_sign: -1.0
    predock_lateral_align_no_motion_timeout_sec: 2.0
    predock_lateral_align_motion_epsilon_m: 0.005
    predock_lateral_align_divergence_epsilon_m: 0.015
    predock_lateral_align_divergence_count: 2
    predock_lateral_align_auto_reverse_on_divergence: true
    predock_lateral_align_forced_mode_topic: "/ranger_mini3/forced_mode"
    predock_lateral_align_forced_mode: "side_slip"
    predock_lateral_align_release_mode: "auto"
    fine_docking_entry_require_gs2_fresh: true
    fine_docking_entry_require_predock_yaw_aligned: true
    fine_docking_entry_max_distance_m: 0.35
    fine_docking_entry_max_lateral_m: 0.08
    fine_docking_entry_max_yaw_rad: 0.0349
    fine_docking_retry_on_yaw_reject: true
    docking_fine_wait_for_bridge_smoothing_enabled: true
    docking_fine_bridge_smoothing_wait_timeout_ms: 5000
    docking_fine_bridge_smoothing_sample_period_ms: 100
    docking_fine_bridge_smoothing_stable_samples: 3
    docking_fine_bridge_smoothing_zero_cmd_during_wait: true
    docking_pause_global_correction_during_fine: true
    localization_bridge_correction_pause_service: "/robot_localization_bridge/set_correction_paused"
    mode_controller_status_topic: "/ranger_mini3_mode_controller/status"
    mapping_2d_live_map_topic: "/map"
    mapping_2d_live_map_max_age_sec: 3.0
    scan_topic: "/scan"
    scan_max_age_sec: 2.0
    tf_topic: "/tf"
    tf_static_topic: "/tf_static"
    tf_map_frame: "map"
    tf_odom_frame: "odom"
    tf_base_frame: "base_link"
    post_relocalization_static_lidar_frame: "lidar_level_link"
    tf_pose_max_age_sec: 2.0
    robot_pose_freshness_sec: 0.5
    tf_chain_freshness_sec: 0.30
    tf_chain_settle_timeout_sec: 2.0
    local_costmap_topic: "/local_costmap/costmap"
    post_relocalization_settle_enabled: true
    post_relocalization_settle_min_ms: 800
    post_relocalization_settle_max_ms: 3000
    post_relocalization_stable_tf_samples: 5
    post_relocalization_tf_sample_period_ms: 100
    post_relocalization_zero_cmd: true
    post_relocalization_require_local_costmap_update: true
    post_relocalization_required_local_costmap_updates: 2
    post_relocalization_reject_if_new_message_filter_drop: true
    post_relocalization_map_odom_publish_gap_warn_ms: 100.0
    post_relocalization_map_odom_publish_gap_fail_ms: 250.0
    post_undock_relocalization_settle_enabled: true
    post_undock_relocalization_settle_min_ms: 800
    post_undock_relocalization_settle_max_ms: 5000
    post_undock_stable_tf_samples: 2
    post_undock_tf_sample_period_ms: 100
    post_undock_required_local_costmap_updates: 2
    post_undock_reject_if_new_message_filter_drop: true
    post_undock_zero_cmd_during_settle: true
    post_relocalization_large_correction_translation_m: 0.5
    post_relocalization_large_correction_yaw_rad: 0.3
    post_relocalization_large_correction_min_ms: 1500

    teleop_cmd_topic: "/cmd_vel_api"
    teleop_reverse_enable_topic: "/ranger_mini3/teleop_allow_reverse"
    teleop_pose_topic: "/local_state/odometry"
    teleop_max_linear_x_mps: 1.00
    teleop_max_angular_z_radps: 0.55
    teleop_allow_reverse: true
    teleop_require_mapping_active: true
    teleop_watchdog_timeout_sec: 0.5
    teleop_socket_idle_timeout_sec: 5.0
    teleop_repeat_rate_hz: 20.0
    subscription_default_ttl_ms: 10000
    subscription_max_ttl_ms: 60000

    service_timeout_sec: 8.0
    navigation_cancel_action_wait_sec: 0.75
    docking_stop_service_wait_sec: 3.0
    localization_trigger_service_timeout_sec: 15.0
    localization_bridge_acceptance_timeout_sec: 3.0
    localization_bridge_acceptance_max_distance_m: 1.0
    localization_bridge_acceptance_max_yaw_rad: 0.35
    manual_relocalization_amcl_refine_enabled: false
    manual_relocalization_amcl_refine_required: false
    manual_relocalization_amcl_refine_timeout_sec: 8.0
    manual_relocalization_amcl_refine_poll_ms: 100
    manual_relocalization_amcl_refine_request_period_ms: 500
    # Normal navigation goals no longer trigger explicit relocalization or
    # bridge force-accept. Use the explicit recovery localization endpoint
    # before retrying a goal when localization is degraded.
    navigation_relocalize_before_goal: false
    navigation_relocalize_before_goal_always: false
    navigation_relocalize_before_goal_required: false
    navigation_relocalize_wait_sec: 8.0
    navigation_goal_result_timeout_sec: 600.0
    navigation_goal_position_success_tolerance_m: 0.06
    navigation_terminal_speed_limit_enabled: true
    navigation_terminal_speed_limit_topic: "/speed_limit"
    navigation_terminal_speed_limit_far_distance_m: 2.4
    navigation_terminal_speed_limit_mid_distance_m: 1.5
    navigation_terminal_speed_limit_near_distance_m: 0.9
    navigation_terminal_speed_limit_crawl_distance_m: 0.35
    navigation_terminal_speed_limit_far_mps: 1.20
    navigation_terminal_speed_limit_mid_mps: 0.65
    navigation_terminal_speed_limit_near_mps: 0.32
    navigation_terminal_speed_limit_crawl_mps: 0.16
    navigation_terminal_speed_limit_final_mps: 0.08
    navigation_default_goal_completion_policy: "pose_required"
    navigation_delivery_point_goal_completion_policy: "pose_required"
    navigation_position_only_nav2_yaw_mode: "approach_heading"
    navigation_position_only_approach_heading_min_distance_m: 0.20
    navigation_max_reposition_after_yaw_retry: 0
    navigation_reposition_after_yaw_drift_timeout_sec: 30.0
    nav2_native_goal_completion_enabled: true
    nav2_rotation_shim_enabled: true
    api_final_yaw_align_fallback_enabled: true
    post_nav2_final_verify_enabled: true
    post_nav2_final_verify_wait_bridge_smoothing: true
    post_nav2_final_verify_bridge_wait_timeout_ms: 2000
    post_nav2_final_verify_bridge_wait_sample_period_ms: 100
    post_nav2_final_verify_request_amcl_nomotion_update: true
    post_nav2_final_verify_amcl_nomotion_update_service: "/request_nomotion_update"
    post_nav2_final_verify_max_retry_count: 3
    post_nav2_final_verify_acceptance_slack_m: 0.02
    post_nav2_final_verify_xy_retry_min_error_m: 0.06
    post_nav2_final_verify_xy_retry_max_error_m: 0.35
    post_nav2_final_verify_yaw_retry_if_failed: true
    post_nav2_final_verify_retry_uses_same_nav2_goal: true
    post_nav2_final_verify_api_velocity_correction_enabled: true
    post_nav2_final_verify_reverse_permit_enabled: true
    post_nav2_final_verify_reverse_enable_topic: "/ranger_mini3/allow_reverse"
    post_nav2_final_verify_terminal_lateral_correction_enabled: true
    post_nav2_final_verify_terminal_lateral_target_m: 0.03
    post_nav2_final_verify_terminal_lateral_trigger_m: 0.07
    post_nav2_final_verify_terminal_lateral_max_xy_m: 0.30
    post_nav2_final_verify_terminal_lateral_max_forward_m: 0.12
    post_nav2_final_verify_terminal_lateral_speed_mps: 0.08
    post_nav2_final_verify_terminal_lateral_kp: 0.8
    post_nav2_final_verify_terminal_lateral_timeout_sec: 8.0
    post_nav2_final_verify_terminal_lateral_command_sign: 1.0
    navigation_near_goal_stalled_handoff_enabled: true
    navigation_near_goal_stalled_handoff_distance_m: 0.30
    navigation_near_goal_stalled_handoff_min_wait_sec: 3.0
    navigation_near_goal_stalled_handoff_stall_sec: 1.5
    navigation_near_goal_stalled_handoff_improvement_epsilon_m: 0.02
    navigation_nav2_failed_near_goal_retry_enabled: true
    navigation_nav2_failed_near_goal_retry_max_count: 1
    navigation_nav2_failed_near_goal_retry_max_distance_m: 0.35
    navigation_nav2_failed_near_goal_retry_requires_yaw_error: false
    navigation_final_yaw_align_enable: true
    navigation_final_yaw_tolerance_rad: 0.05
    navigation_final_yaw_align_trigger_rad: 0.08
    navigation_final_yaw_align_success_tolerance_rad: 0.045
    navigation_final_yaw_align_speed_radps: 0.60
    navigation_final_yaw_align_min_speed_radps: 0.06
    navigation_final_yaw_align_kp: 1.2
    navigation_final_yaw_align_max_speed_radps: 0.60
    navigation_final_yaw_align_slowdown_start_rad: 0.30
    navigation_final_yaw_align_slow_max_speed_radps: 0.20
    navigation_final_yaw_align_timeout_sec: 8.0
    navigation_final_yaw_align_max_xy_drift_m: 0.08
    navigation_final_yaw_align_require_fresh_pose: true
    # Bounded fallback for ordinary pose_required goals: if Nav2 aborts or
    # succeeds with XY close enough but yaw outside tolerance, align yaw through
    # /cmd_vel_api -> robot_safety instead of sharing collision_monitor's
    # /cmd_vel_collision_checked publisher.
    navigation_final_yaw_align_cmd_topic: "/cmd_vel_api"
    navigation_final_yaw_align_bypass_collision_monitor: true
    navigation_final_yaw_align_zero_cmd_count: 3
    yaw_align_actual_stop_check_enabled: true
    yaw_align_actual_stop_odom_topic: "/wheel/odom"
    yaw_align_actual_wz_threshold_radps: 0.02
    yaw_align_actual_wz_stable_samples: 5
    yaw_align_actual_stop_timeout_ms: 800
    yaw_align_actual_wz_max_age_sec: 0.20
    yaw_align_stop_lead_enabled: true
    yaw_align_stop_lead_time_sec: 0.125
    yaw_align_stop_lead_min_rad: 0.0
    yaw_align_stop_lead_max_rad: 0.09
    navigation_final_yaw_align_wait_bridge_smoothing: true
    navigation_final_yaw_align_bridge_wait_timeout_ms: 2000
    navigation_final_yaw_align_bridge_wait_sample_period_ms: 100
    navigation_pause_global_correction_during_final_yaw: true
    navigation_lifecycle_check_timeout_sec: 1.5
