pointcloud_to_laserscan:
  ros__parameters:
    # Keep mapping and localization on the same leveled 2D structural slice.
    # The slice frame is base_link -> lidar_level_link: same XYZ as lidar_link,
    # same yaw as lidar_link, but roll/pitch zeroed so the 2D scan stays
    # horizontal even when the real lidar is pitched on the vehicle.
    target_frame: lidar_level_link
    transform_tolerance: 0.10
    # Keep mapping and relocalization on the same leveled structural band.
    # This thicker slice is used to recover more long-range wall returns with
    # the current tilted JT128 installation while staying in lidar_level_link.
    min_height: -0.75
    max_height: 0.35
    angle_min: -3.141592653589793
    angle_max: 3.141592653589793
    angle_increment: 0.004363323129985824
    scan_time: 0.05
    range_min: 0.25
    range_max: 40.0
    use_inf: true
    inf_epsilon: 1.0
