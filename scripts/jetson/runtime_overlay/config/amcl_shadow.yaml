amcl:
  ros__parameters:
    use_sim_time: false
    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_link
    # Phase A1.2: /scan_amcl is the AMCL production admission input. The relay
    # preserves /scan header.stamp/frame_id/ranges and only forwards recent
    # scans whose odom<-scan_frame TF exists at the original scan stamp.
    scan_topic: /scan_amcl
    map_topic: /map
    tf_broadcast: false
    set_initial_pose: false
    always_reset_initial_pose: false
    first_map_only: false

    robot_model_type: nav2_amcl::OmniMotionModel

    # Ranger odom is a short-term motion prior only; map observations must be
    # allowed to correct drift instead of over-trusting the chassis model.
    alpha1: 0.4
    alpha2: 0.4
    alpha3: 0.4
    alpha4: 0.4
    alpha5: 0.2

    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    laser_model_type: likelihood_field_prob
    max_beams: 60
    laser_likelihood_max_dist: 2.0
    z_hit: 0.5
    z_rand: 0.5
    z_short: 0.0
    z_max: 0.0
    sigma_hit: 0.2
    lambda_short: 0.1
    do_beamskip: true
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

    update_min_d: 0.05
    update_min_a: 0.05
    transform_tolerance: 0.2
    save_pose_rate: 0.5
