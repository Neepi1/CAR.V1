slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    mode: mapping
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan

    debug_logging: false
    throttle_scans: 1
    enable_interactive_mode: false

    map_update_interval: 0.5
    transform_publish_period: 0.0
    resolution: 0.05
    max_laser_range: 40.0
    minimum_time_interval: 0.05
    transform_timeout: 0.35
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000

    use_scan_matching: true
    use_scan_barycenter: false
    minimum_travel_distance: 0.04
    minimum_travel_heading: 0.02
    scan_buffer_size: 30
    scan_buffer_maximum_scan_distance: 25.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 2.0
    do_loop_closing: false
