robot_local_state:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.15
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Keep wheel yaw pose and wheel twist as low-latency heading/speed anchors,
    # but do not fuse wheel x/y pose as an absolute position anchor.
    odom0: /wheel/odom_ekf
    odom0_config: [false, false, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 20
    odom0_nodelay: true
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 1.5

    # Feed wheel x/y only as differential motion so a bad absolute wheel pose
    # cannot hard-anchor EKF x/y through the whole navigation leg.
    odom1: /wheel/odom_ekf
    odom1_config: [true, true, false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 20
    odom1_nodelay: true
    odom1_differential: true
    odom1_relative: false
    odom1_pose_rejection_threshold: 5.0
    odom1_twist_rejection_threshold: 1.5

    imu0: /lidar_imu_bias_corrected
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 100
    imu0_nodelay: true
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 0.8

    use_control: false
