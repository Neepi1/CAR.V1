robot_local_state:
  ros__parameters:
    mock_mode: false
    publish_tf: true
    output_topic: /local_state/odometry
    input_odom_topic: /wheel/odom
    input_base_frame: base_link
    input_imu_topic: /lidar_imu
    odom_frame: odom
    base_frame: base_link
    # Ranger SDK /wheel/odom already uses the canonical base_link child frame
    # by default; passthrough only republishes the same boundary topic.
    odom_yaw_offset_rad: 0.0
    rotate_odom_position_with_yaw_offset: false
    publish_rate_hz: 30.0
    republish_latest: true
    republish_latest_max_age_sec: 0.50
