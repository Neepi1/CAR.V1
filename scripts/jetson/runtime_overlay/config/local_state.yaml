robot_local_state:
  ros__parameters:
    mock_mode: false
    publish_tf: true
    output_topic: /local_state/odometry
    input_odom_topic: /wheel/odom
    input_base_frame: ranger_base_link
    input_imu_topic: /lidar_imu
    odom_frame: odom
    base_frame: base_link
    # Ranger SDK /wheel/odom is treated as the chassis odometry truth.
    # robot_local_state only republishes it as the canonical base_link frame.
    odom_yaw_offset_rad: 0.0
    rotate_odom_position_with_yaw_offset: false
    publish_rate_hz: 20.0
