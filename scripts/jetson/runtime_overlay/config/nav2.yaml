lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 0.0
    node_names:
      - controller_server
      - velocity_smoother
      - collision_monitor
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower

lifecycle_manager_costmap_filters:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 0.0
    node_names:
      - keepout_filter_mask_server
      - keepout_costmap_filter_info_server

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.05
      downsample_costmap: false
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    odom_topic: /local_state/odometry
    speed_limit_topic: /speed_limit
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.01
    # Dynamic obstacles in building corridors should make the controller pause
    # briefly, not abort the business goal on a single blocked MPPI cycle.
    failure_tolerance: 3.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath", "FollowPathFallback"]
    progress_checker:
      # PoseProgressChecker counts legitimate in-place yaw progress during
      # RotationShim startup alignment. Keep the linear progress radius below
      # the ordinary point-goal tolerance so terminal creep is not
      # misclassified as a no-progress failure on Ranger Mini 3.
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.03
      required_movement_angle: 0.05
      movement_time_allowance: 12.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      # Re-evaluate XY and yaw together on every tick. A latched XY gate can
      # falsely accept a goal after a near-goal obstacle or avoidance maneuver
      # pushes the robot back outside the ordinary point tolerance.
      stateful: false
      xy_goal_tolerance: 0.06
      yaw_goal_tolerance: 0.05
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_mppi_controller::MPPIController"
      # Ackermann MPPI cannot spin in place: its hard turning-radius constraint
      # collapses wz with vx near zero. Let RotationShim own path entry heading
      # before MPPI starts crawling with physically ineffective tiny commands.
      angular_dist_threshold: 0.45
      angular_disengage_threshold: 0.075
      forward_sampling_distance: 0.55
      # Ranger Mini 3 can enter chassis SPINNING mode on aggressive pure-yaw
      # shim commands; keep Nav2-owned heading closure smooth and observable.
      rotate_to_heading_angular_vel: 0.60
      max_angular_accel: 1.2
      simulate_ahead_time: 1.0
      # RotationShim owns ordinary pose_required terminal heading and docking
      # predock staging heading before the Nav2 action succeeds.
      rotate_to_goal_heading: true
      time_steps: 48
      model_dt: 0.0666666667
      batch_size: 1200
      iteration_count: 1
      prune_distance: 4.5
      transform_tolerance: 0.10
      temperature: 0.30
      gamma: 0.03
      motion_model: "Ackermann"
      AckermannConstraints:
        min_turning_r: 0.81
      visualize: false
      regenerate_noises: false
      retry_attempt_limit: 3
      reset_period: 1.0
      # Match the Ranger Mini 3's observed smooth chassis response. MPPI may
      # still request 1.2 m/s cruise, but samples and acceleration limits should
      # not assume snap acceleration that the physical base will not track.
      vx_std: 0.30
      vy_std: 0.0
      wz_std: 0.32
      vx_max: 1.20
      # Allow only a low-speed terminal reverse correction. PreferForwardCritic
      # keeps long-range path following forward-biased, while this gives MPPI a
      # way to recover the measured near-goal forward overshoot instead of
      # stalling outside the 6 cm goal checker tolerance.
      vx_min: -0.08
      vy_max: 0.0
      wz_max: 0.70
      critics:
        - "ObstaclesCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"
        - "VelocityDeadbandCritic"
        - "TwirlingCritic"
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 16.0
        threshold_to_consider: 1.5
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        threshold_to_consider: 1.5
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 2.0
        critical_weight: 20.0
        consider_footprint: true
        collision_cost: 100000.0
        collision_margin_distance: 0.08
        near_goal_distance: 0.25
        inflation_radius: 0.35
        cost_scaling_factor: 6.0
        inflation_layer_name: "local_inflation_layer"
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.4
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 1.5
        offset_from_furthest: 12
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        # Keep long-range goals from falling into the low-speed terminal
        # correction local optimum after vx_min is opened for final overshoot
        # recovery.
        cost_weight: 7.0
        offset_from_furthest: 10
        threshold_to_consider: 1.2
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.8
        max_angle_to_furthest: 1.5
        mode: 0
      TwirlingCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.0
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        # Strongly bias long-range samples forward; this critic drops out near
        # the goal so the bounded -0.08 m/s terminal reverse correction remains
        # available.
        cost_weight: 20.0
        threshold_to_consider: 0.50
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 90.0
        deadband_velocities: [0.025, 0.0, 0.025]
    FollowPathFallback:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.80
      lookahead_dist: 0.75
      min_lookahead_dist: 0.40
      max_lookahead_dist: 1.10
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.00
      transform_tolerance: 0.10
      use_velocity_scaled_lookahead_dist: true
      use_rotate_to_heading: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.80
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: "odom"
    robot_base_frame: "base_link"
    transform_tolerance: 0.10
    simulate_ahead_time: 1.5
    max_rotational_vel: 1.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.5

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /local_state/odometry
    bt_loop_duration: 50
    # Nav2 BT action/service acknowledgement can exceed 1s on Jetson while
    # AMCL, costmaps, and Fast DDS discovery are active. Keep HTTP goal submit
    # asynchronous, but give BT-internal servers enough time to acknowledge.
    default_server_timeout: 5000
    wait_for_service_timeout: 8000
    transform_tolerance: 0.10
    default_nav_to_pose_bt_xml: /workspaces/njrh-v3/workspace1/install/robot_nav_config/share/robot_nav_config/behavior_trees/navigate_to_pose.xml
    default_nav_through_poses_bt_xml: /workspaces/njrh-v3/workspace1/install/robot_nav_config/share/robot_nav_config/behavior_trees/navigate_through_poses.xml
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_navigate_through_poses_action_bt_node

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 0

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["SimpleSmoother"]
    SimpleSmoother:
      plugin: "nav2_smoother::SimpleSmoother"

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 30.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [1.20, 0.0, 0.70]
    min_velocity: [-0.08, 0.0, -0.70]
    max_accel: [0.55, 0.0, 0.90]
    max_decel: [-0.95, 0.0, -1.10]
    odom_topic: /local_state/odometry
    odom_duration: 0.2
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      rolling_window: false
      track_unknown_space: true
      resolution: 0.05
      transform_tolerance: 0.10
      footprint: "[[0.36, 0.25], [0.36, -0.25], [-0.36, -0.25], [-0.36, 0.25]]"
      footprint_padding: 0.03
      plugins: ["static_layer", "global_inflation_layer"]
      filters: ["keepout_filter"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /map
        map_subscribe_transient_local: true
        subscribe_to_updates: false
      global_inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 5.0
        inflation_radius: 0.60
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: /costmap_filter_info/keepout
      speed_filter:
        plugin: "nav2_costmap_2d::SpeedFilter"
        enabled: true
        filter_info_topic: /costmap_filter_info/speed
        speed_limit_topic: /speed_limit
      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 12.0
      publish_frequency: 8.0
      # Local costmap global_frame must be a continuous local fixed frame such
      # as odom. Do not use base_link here: controller_server reads the robot
      # pose through the costmap, and a base_link global frame keeps that pose
      # nearly constant, causing false SimpleProgressChecker failures.
      # Obstacle sources may still use sensor_frame=base_link below.
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      transform_tolerance: 0.15
      footprint: "[[0.36, 0.25], [0.36, -0.25], [-0.36, -0.25], [-0.36, 0.25]]"
      footprint_padding: 0.03
      plugins: ["obstacle_layer", "local_inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        # Use Nav2's native LaserScan observation model for both marking and
        # clearing. LaserScan inf ranges carry explicit free-space rays, unlike
        # the previous custom PointCloud2 clearing cloud.
        combination_method: 0
        footprint_clearing_enabled: true
        min_obstacle_height: -0.20
        max_obstacle_height: 1.40
        observation_sources: scan
        scan:
          topic: /scan
          sensor_frame: lidar_level_link
          data_type: LaserScan
          marking: true
          clearing: true
          inf_is_valid: true
          observation_persistence: 0.0
          min_obstacle_height: -0.20
          max_obstacle_height: 1.40
          obstacle_min_range: 0.25
          obstacle_max_range: 5.50
          raytrace_min_range: 0.25
          raytrace_max_range: 8.00
      local_inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 6.0
        inflation_radius: 0.35
      always_send_full_costmap: true

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "/cmd_vel_nav"
    cmd_vel_out_topic: "/cmd_vel_collision_checked"
    transform_tolerance: 0.10
    source_timeout: 1.5
    base_shift_correction: true
    stop_pub_timeout: 0.3
    polygons: ["StopZone", "SlowZone"]
    StopZone:
      type: "polygon"
      points: [0.42, 0.22, 0.42, -0.22, -0.30, -0.22, -0.30, 0.22]
      action_type: "stop"
      max_points: 8
      visualize: false
      polygon_pub_topic: "collision_monitor/stop_zone"
      enabled: true
    SlowZone:
      type: "polygon"
      points: [0.85, 0.45, 0.85, -0.45, -0.35, -0.45, -0.35, 0.45]
      action_type: "slowdown"
      slowdown_ratio: 0.65
      max_points: 12
      visualize: false
      polygon_pub_topic: "collision_monitor/slow_zone"
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      enabled: true
