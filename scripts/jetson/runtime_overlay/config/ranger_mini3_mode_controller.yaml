ranger_mini3_mode_controller:
  ros__parameters:
    cmd_vel_in_topic: /cmd_vel_safe
    cmd_vel_out_topic: /cmd_vel

    # Production default. custom keeps the legacy repository-owned Ackermann
    # shaping path available only for rollback and A/B diagnostics.
    mode_controller_profile: official_passthrough

    wheelbase_m: 0.494
    track_m: 0.364
    max_linear_mps: 1.5
    max_linear_high_angle_mps: 0.75
    max_ackermann_angle_rad: 0.698
    max_spin_radps: 3.259
    max_lateral_mps: 0.08
    max_crab_yaw_radps: 0.15

    publish_rate_hz: 50.0
    cmd_timeout_s: 0.25
    mode_policy: auto
    allow_reverse: false
    lateral_policy: reject
    dual_ackermann_angle: inner
    spin_steering_threshold_rad: 0.698
    spin_enter_steering_threshold_rad: 0.698
    spin_exit_steering_threshold_rad: 0.489
    spin_enter_debounce_s: 0.4
    spin_min_hold_s: 1.0
    auto_spin_max_linear_mps: 0.08
    spin_on_high_curvature_while_moving: false
    reverse_enable_topic: /ranger_mini3/allow_reverse
    docking_reverse_enable_topic: /ranger_mini3/docking_allow_reverse
    teleop_reverse_enable_topic: /ranger_mini3/teleop_allow_reverse
    reverse_enable_timeout_s: 0.75
    linear_epsilon_mps: 0.02
    lateral_epsilon_mps: 0.02
    yaw_epsilon_radps: 0.02
    publish_zero_on_startup: true

    status_topic: /ranger_mini3_mode_controller/status
    desired_mode_topic: /ranger_mini3/desired_motion_mode
    actual_motion_state_topic: /motion_state
    actual_system_state_topic: /system_state
    actual_motion_mode_max_age_sec: 0.5
    mode_alignment_warn_after_sec: 0.25
    forced_mode_topic: /ranger_mini3/forced_mode
    park_topic: /ranger_mini3/park
